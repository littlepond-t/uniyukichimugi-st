function sfx(type){if(muted||!actx)return;try{const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);let f=600,d=0.08,v=0.06,w='triangle';
  if(type==='shot'){f=820;d=0.05;v=0.024;w='sine';}else if(type==='ehit'){f=520;d=0.04;v=0.04;}else if(type==='boom'){f=200;d=0.18;v=0.1;w='triangle';}else if(type==='eshot'){f=300;d=0.05;v=0.033;w='sawtooth';}else if(type==='hurt'){f=150;d=0.25;v=0.16;w='sawtooth';}else if(type==='bark'){f=420;d=0.12;v=0.12;w='square';}else if(type==='bomb'){f=180;d=0.7;v=0.18;w='triangle';}else if(type==='win'){f=660;d=0.5;v=0.14;w='triangle';}else if(type==='start'){f=560;d=0.12;v=0.09;}else if(type==='treat'){f=1100;d=0.09;v=0.05;w='triangle';}else if(type==='fuse'){f=90;d=1.0;v=0.2;w='sawtooth';}

const Music={on:true,pitch:1,running:false,master:null,cur:null,step:0,nextT:0,noise:null,
  ensure(){if(!actx)return false;if(!this.master){this.master=actx.createGain();this.master.gain.value=0;this.master.connect(actx.destination);const b=actx.createBuffer(1,(actx.sampleRate*0.3)|0,actx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;this.noise=b;}return true;},

  tone(f,t,dur,vol,type,glide){try{const pt=this.pitch||1,o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(this.master);o.type=type||'square';o.frequency.setValueAtTime(f*pt,t);if(glide)o.frequency.exponentialRampToValueAtTime(glide*pt,t+dur);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.03);}catch(e){}},

  tick(i,t,spb){const s=this.cur;if(s.kick&&s.kick[i])this.kick(t);if(s.hat&&s.hat[i])this.hat(t,0.09);if(s.bass&&s.bass[i]!=null)this.tone(s.bass[i],t,spb*3.5,0.18,'triangle');if(s.lead&&s.lead[i]!=null)this.tone(s.lead[i],t,spb*(s.leadLen||2.3),0.09,s.leadWave||'square');if(s.pad&&s.pad[i]!=null)this.tone(s.pad[i],t,spb*8,0.05,'sawtooth');}

function eyeP(c,ex,ey,R,expr,blink){

function mouthP(c,cx,cy,R,expr){c.strokeStyle='#3a2c22';c.lineWidth=R*0.045;c.lineCap='round';c.lineJoin='round';const my=cy+R*0.42;

function bowTri(c,x,y,w,h){c.beginPath();c.moveTo(x,y);c.quadraticCurveTo(x+w*1.2,y-h*1.3,x+w,y-h);c.quadraticCurveTo(x+w*0.9,y,x+w,y+h);c.quadraticCurveTo(x+w*1.2,y+h*1.3,x,y);c.closePath();c.fill();}
function poodleBody(c,cx,cy,R,d){c.fillStyle=fluffGrad(c,cx,cy,R*0.95,d);fluffy(c,cx,cy,R*0.9,13,0.07);c.fill();c.fillStyle=fluffGrad(c,cx,cy+R*0.7,R*0.4,d);for(const sx of[-1,1]){c.beginPath();c.ellipse(cx+sx*R*0.42,cy+R*0.78,R*0.3,R*0.4,0,0,TAU);c.fill();}c.fillStyle=d.furHi;for(const sx of[-1,1]){fluffy(c,cx+sx*R*0.42,cy+R*1.02,R*0.22,7,0.16);c.fill();}}

/* 飛行ポーズ（自機・編隊）。alt=裏バージョン（マント＆星オーラ＆気合） */
function drawFlyer(c,x,y,R,key,expr,t,ph,alt){

  }
  c.save();c.globalCompositeOperation='lighter';const gg=c.createRadialGradient(x,y+R*0.2,2,x,y+R*0.2,R*1.6);gg.addColorStop(0,alt?'rgba(255,220,255,.55)':'rgba(255,240,210,.5)');gg.addColorStop(1,'rgba(255,240,210,0)');c.fillStyle=gg;c.beginPath();c.arc(x,y+R*0.2,R*1.6,0,TAU);c.fill();c.restore();

  c.save();c.globalAlpha=0.92;c.fillStyle='rgba(255,255,255,.85)';const wf=Math.sin(t*14+(ph||0))*R*0.05;for(const sx of[-1,1]){fluffy(c,x+sx*R*0.95,y+R*0.5+wf,R*0.42,6,0.2);c.fill();}c.restore();

/* ===== SCENE ===== */
function buildScene(themeKey){curTheme=themeKey;const th=THEMES[themeKey];const D={W,H,th,scroll:0,deco:[],stars:[],hillsA:[],hillsB:[]};
  for(let i=0;i<14;i++)D.deco.push({x:Math.random(),y:Math.random(),s:rand(12,26),sp:rand(20,46),p:rand(0,TAU),a:rand(0.3,0.65)});
  if(th.sky==='night')for(let i=0;i<70;i++)D.stars.push({x:Math.random(),y:rand(0,0.7),s:rand(0.5,1.8),p:rand(0,TAU)});
  for(let layer=0;layer<2;layer++){const pts=[],n=6;for(let i=0;i<=n;i++)pts.push(rand(0,1));(layer?D.hillsB:D.hillsA).push(...pts);}
  sceneData=D;}
function hillPath(base,amp,pts,off){ctx.beginPath();ctx.moveTo(0,H);const n=pts.length-1;for(let i=0;i<=n;i++){const x=i/n*W;const y=base+Math.sin(i*1.3+off)*amp*0.4-pts[i]*amp;ctx.lineTo(x,y);}ctx.lineTo(W,H);ctx.closePath();}
function drawScene(dt){
  if(!sceneData||sceneData.W!==W||sceneData.H!==H)buildScene(curTheme);
  const D=sceneData,th=D.th,t=now();D.scroll+=dt*40;
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,th.top);g.addColorStop(0.5,th.mid);g.addColorStop(1,th.bot);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(th.sky!=='night'){const sx=W*0.72,sy=H*0.16;ctx.save();ctx.globalCompositeOperation='lighter';const sg=ctx.createRadialGradient(sx,sy,4,sx,sy,110);sg.addColorStop(0,'rgba(255,250,225,.6)');sg.addColorStop(1,'rgba(255,250,225,0)');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,110,0,TAU);ctx.fill();ctx.restore();ctx.fillStyle=th.sun;ctx.beginPath();ctx.arc(sx,sy,34,0,TAU);ctx.fill();}
  else{const mx=W*0.74,my=H*0.15;ctx.save();ctx.globalCompositeOperation='lighter';const mg=ctx.createRadialGradient(mx,my,2,mx,my,80);mg.addColorStop(0,'rgba(255,250,225,.45)');mg.addColorStop(1,'rgba(255,250,225,0)');ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx,my,80,0,TAU);ctx.fill();ctx.restore();ctx.fillStyle=th.sun;ctx.beginPath();ctx.arc(mx,my,26,0,TAU);ctx.fill();ctx.fillStyle=shade(th.top,0.9);ctx.beginPath();ctx.arc(mx+8,my-6,22,0,TAU);ctx.fill();D.stars.forEach(s=>{ctx.globalAlpha=0.4+0.6*(0.5+0.5*Math.sin(t*3+s.p));ctx.fillStyle='#fff';ctx.fillRect(s.x*W,s.y*H,s.s,s.s);});ctx.globalAlpha=1;}
  ctx.fillStyle=th.hillB;hillPath(H*0.78,H*0.18,D.hillsB,t*0.2);ctx.fill();
  ctx.fillStyle=th.hillA;hillPath(H*0.9,H*0.16,D.hillsA,t*0.35+1);ctx.fill();
  D.deco.forEach(it=>{if(horiz){it.x-=(it.sp*dt)/W;if(it.x<-0.1){it.x=1.1;it.y=Math.random();}}else{it.y+=(it.sp*dt)/H;if(it.y>1.1){it.y=-0.1;it.x=Math.random();}}const x=it.x*W,y=it.y*H;ctx.save();ctx.globalAlpha=it.a;ctx.translate(x,y);ctx.rotate(Math.sin(t+it.p)*0.3);ctx.fillStyle=th.decoCol;drawDeco(th.deco,it.s);ctx.restore();});
  if(loop2){ctx.fillStyle='rgba(40,10,60,.34)';ctx.fillRect(0,0,W,H);ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle='rgba(120,40,160,.10)';ctx.fillRect(0,0,W,H);ctx.restore();}
}
function drawDeco(kind,s){
  if(kind==='paw'){ctx.beginPath();ctx.ellipse(0,s*0.18,s*0.34,s*0.28,0,0,TAU);ctx.fill();for(const[tx,ty]of[[-0.32,-0.2],[-0.11,-0.34],[0.11,-0.34],[0.32,-0.2]]){ctx.beginPath();ctx.ellipse(tx*s,ty*s+s*0.1,s*0.12,s*0.15,0,0,TAU);ctx.fill();}}
  else if(kind==='heart'){ctx.beginPath();ctx.moveTo(0,s*0.3);ctx.bezierCurveTo(s*0.5,-s*0.2,s*0.45,-s*0.5,0,-s*0.15);ctx.bezierCurveTo(-s*0.45,-s*0.5,-s*0.5,-s*0.2,0,s*0.3);ctx.fill();}
  else{ctx.beginPath();for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2;const rr2=i%2?s*0.2:s*0.45;const x=Math.cos(a)*rr2,y=Math.sin(a)*rr2;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.fill();}
}

function spawnEnemy(type,pos){const E={type,t:rand(0,6),shootAcc:rand(0.6,1.4),vy:90,amp:0,id:++eid,horiz};
  if(type==='bfly'){E.hp=2;E.r=17;E.vy=118;E.pts=50;E.amp=rand(40,70);}

function buildTrueAttacks(){const col='#ffd24a',gl='rgba(255,190,70,.55)',col2='#ff5aa0',gl2='rgba(255,90,160,.5)';

    {dur:3.0,fire(b,e,dt){const p=ph(b);b.subAcc-=dt;if(b.subAcc<=0){b.subAcc=(p>=1?0.4:0.55)*b.rt;b.spin+=0.5;emitRing(b.x,b.y,(p>=2?26:20)+b.ex,b.spin,150*b.sp,8,col,gl);if(p>=1)emitRing(b.x,b.y,16,-b.spin,210*b.sp,7,col2,gl2);sfx('eshot');}}},

    {dur:2.6,fire(b,e,dt){if(e<0.7){b.charge=1;}else if(!b.shoutDone){b.shoutDone=true;b.charge=0;const lines=b.lines,cols=['#ff4f7a','#3aa0ff','#ffce3a','#b0a0ff'],gls=['rgba(255,90,140,.5)','rgba(90,180,255,.5)','rgba(255,210,80,.55)','rgba(150,140,255,.55)'];emitOno(b.x,b.y+10,lines[b.lineIdx%lines.length],cols[b.lineIdx%cols.length],gls[b.lineIdx%gls.length]);b.lineIdx=(b.lineIdx+1)%lines.length;b.line=lines[b.lineIdx];sfx('boom');screenShake=10;}}}];

function buildOniAttacks(){const OFF=72,A='#ffd24a',ga='rgba(255,190,70,.55)',B='#5af0ff',gb='rgba(90,240,255,.55)';

const DIFF_KEYS=['easy','normal','hard','oni'];
function csum(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))%1296;return h.toString(36).padStart(2,'0');}
function liveRun(){const playing=(state==='wave'||state==='boss'||state==='bossintro'||state==='stageintro'||state==='clear'||state==='finalintro'||state==='rushnext'||state==='fakeclear'||state==='fuseintro');
  if(playing)return{hero:heroKey,diff:curDiff,loopCount,stageIdx,finalMode,score,lives,pow,bestCombo};return saveData;}
function makeCode(){const sv=liveRun(),hasRun=sv?1:0;const f=[3,totalScore|0,hiScore|0,hasRun];
  if(hasRun)f.push(Math.max(0,HERO_ORDER.indexOf(sv.hero||'uni')),Math.max(0,DIFF_KEYS.indexOf(sv.diff||'normal')),sv.loopCount||0,sv.stageIdx||0,sv.finalMode?1:0,sv.score||0,(sv.lives==null?2:sv.lives),sv.pow||1,sv.bestCombo||0);
  const body=f.map(n=>Math.max(0,Math.floor(n)).toString(36)).join('-');return ('P'+body+'-'+csum(body)).toUpperCase();}
function applyCode(raw){if(!raw)return 'パスワードを入力してね';let s=raw.trim().toUpperCase().replace(/\s+/g,'');if(s[0]!=='P')return 'パスワードが正しくありません';s=s.slice(1);const parts=s.split('-');if(parts.length<5)return 'パスワードが短すぎます';const sum=parts.pop();const body=parts.join('-');if(csum(body.toLowerCase())!==sum.toLowerCase())return '打ち間違いがあるみたい…';const f=parts.map(x=>parseInt(x,36));if(f.some(isNaN))return 'パスワードが正しくありません';if(f[0]!==3)return 'バージョンが違います';
  totalScore=Math.max(totalScore,f[1]||0);saveTotal();hiScore=Math.max(hiScore,f[2]||0);saveHi();
  if(f[3]&&f.length>=13){heroKey=HERO_ORDER[f[4]]||'uni';curDiff=DIFF_KEYS[f[5]]||'normal';loopCount=f[6]||0;loop2=loopCount>=1;saveData={hero:heroKey,diff:curDiff,loopCount,loop2,stageIdx:f[7]||0,finalMode:!!f[8],score:f[9]||0,lives:f[10],pow:f[11]||1,bestCombo:f[12]||0};banked=false;closeOv();loadProgress();return '';}

function onDown(e){
  if(ovOpen)return;
  initAudio();if(Music.on)Music.toggle(!muted);
  const rect=canvas.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top;
  if(state==='title'){if(inRect(px,py,pwBtn())){openPassword();return;}if(saveData){if(inRect(px,py,contBtn())){loadProgress();return;}if(py>H*0.66){state='charselect';stateTimer=0;}return;}state='charselect';stateTimer=0;return;}
  if(state==='charselect'){const bs=charBtns();for(const b of bs){if(inRect(px,py,b)){heroKey=b.key;state='diffselect';stateTimer=0;return;}}return;}
  if(state==='diffselect'){const bs=diffBtns();for(const b of bs){if(inRect(px,py,b)){curDiff=b.key;newGame();return;}}return;}
  if(state==='stageintro'){if(inRect(px,py,pauseBtn())){openPause();return;}if(stateTimer>0.4)state='wave';return;}
  if(state==='finalintro'){if(stateTimer>0.5)spawnRushBoss(0);return;}
  if(state==='clear'){if(stateTimer>0.5){hearts=Math.min(MAXH,hearts+1);startStage(stageIdx+1);}return;}
  if(state==='fakeclear'){if(stateTimer>1.0){state='fuseintro';stateTimer=0;fuseBurst=false;sfx('fuse');}return;}
  if(state==='victory'){if(inRect(px,py,shareBtn())){shareResult();return;}if(stateTimer>0.6&&inRect(px,py,endBtn())){bankTotal();clearSave();horiz=false;state='title';return;}if(stateTimer>0.6){loopCount=2;loop2=true;lives=Math.min(5,lives+1);hearts=4;addFloat(W/2,H*0.5,'エンドレス突入！','#ffd24a',24);startStage(0);}return;}
  if(state==='gameover'){if(canContinue&&stateTimer>0.6&&inRect(px,py,goContBtn())){canContinue=false;doContinue();return;}if(inRect(px,py,shareBtn())){shareResult();return;}if(stateTimer>0.6){bankTotal();clearSave();horiz=false;state='title';}return;}
  if(state==='rushnext'||state==='fuseintro')return;
  if(state==='bossintro'){if(inRect(px,py,pauseBtn()))openPause();return;}
  if((state==='wave'||state==='boss')&&inRect(px,py,pauseBtn())){openPause();return;}
  if(movePid!==null&&e.pointerId!==movePid){if(special>=1&&bombTimer<=0)activateBomb();return;}
  if(special>=1&&inBomb(px,py)){bombCand=e.pointerId;bombDX=px;bombDY=py;movePid=e.pointerId;return;}
  movePid=e.pointerId;setTarget(px,py);
}

function fireShot(){const lv=pow,hk=heroKey;
  if(hk==='yuki'){player.fireAcc=lv>=5?0.05:0.062;const dmg=Math.max(1,1+(lv>=3?1:0)+(lv>=5?1:0));

    if(lv<=1){shootB(-9,0,dmg);shootB(9,0,dmg);}else if(lv===2){shootB(-11,0,dmg);shootB(11,0,dmg);}else if(lv===3){shootB(0,0,dmg);shootB(-13,-90,dmg);shootB(13,90,dmg);}else if(lv===4){shootB(-16,-140,dmg);shootB(-6,-36,dmg);shootB(6,36,dmg);shootB(16,140,dmg);}else{shootB(0,0,dmg+1);shootB(-12,-66,dmg);shootB(12,66,dmg);shootB(-20,-170,dmg);shootB(20,170,dmg);}}
  sfx('shot');}
function update(dt){
  flash=Math.max(0,flash-dt*2);screenShake=Math.max(0,screenShake-dt*46);slowmo=Math.max(0,slowmo-dt);stateTimer+=dt;
  if(zoomT>0)zoomT=Math.max(0,zoomT-dt);
  for(let i=onoFx.length-1;i>=0;i--){onoFx[i].life-=dt;if(onoFx[i].life<=0)onoFx.splice(i,1);}
  if(player.iframe>0)player.iframe-=dt;if(bombTimer>0){bombTimer-=dt;bombFx+=dt;}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];if(p.ring){p.r+=(p.r1-p.r)*Math.min(1,dt*6);p.life-=dt;if(p.life<=0)parts.splice(i,1);continue;}p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.y+=f.vy*dt;f.vy*=0.95;f.life-=dt;if(f.life<=0)floats.splice(i,1);}
  for(let i=treats.length-1;i>=0;i--){const c=treats[i];c.vy+=900*dt;c.x+=c.vx*dt;c.y+=c.vy*dt;c.spin+=c.vs*dt;c.life-=dt;if(c.life<=0||c.y>H+30)treats.splice(i,1);}
  if(state==='rushnext'&&stateTimer>1.5)spawnRushBoss(rushIndex);
  if(state==='fakeclear'&&stateTimer>3.4){state='fuseintro';stateTimer=0;fuseBurst=false;sfx('fuse');}
  if(state==='fuseintro'){if(!fuseBurst&&stateTimer>2.4){fuseBurst=true;flash=1;flashCol='#fff';screenShake=28;bigBoom(W/2,H*0.42,'#ffd24a');sfx('bomb');}if(stateTimer>3.2){fused=true;spawnTrueBoss();}}
  const playing=(state==='wave'||state==='bossintro'||state==='boss');
  if(playing){
    player.x+=(player.tx-player.x)*Math.min(1,dt*16);player.y+=(player.ty-player.y)*Math.min(1,dt*16);
    for(let i=items.length-1;i>=0;i--){const it=items[i];it.t+=dt;if(it.horiz){it.x-=it.vy*dt;it.y+=Math.sin(it.t*2.2)*14*dt;}else{it.y+=it.vy*dt;}if(it.horiz?it.x<-30:it.y>H+30){items.splice(i,1);continue;}
      if(dist(it.x,it.y,player.x,player.y)<26+player.r){items.splice(i,1);if(it.type==='1UP'){lives=Math.min(5,lives+1);addFloat(player.x,player.y-20,'1UP! 🐾','#7cffb0',22);}else{if(pow<5){pow++;addFloat(player.x,player.y-20,'パワーUP! Lv'+pow,'#ffe27a',20);}else{score+=300;addFloat(player.x,player.y-20,'+300','#ffe27a',18);}}addRing(player.x,player.y,'#fff',6,60,0.3);addPart(player.x,player.y,'#ffe27a',12,220);sfx('treat');}}
    player.fireAcc-=dt;if(player.fireAcc<=0&&bombTimer<=0)fireShot();
    for(let i=pBullets.length-1;i>=0;i--){const b=pBullets[i];if(!b)continue;b.x+=(b.vx||0)*dt;b.y+=b.vy*dt;if(b.y<-30||b.y>H+30||b.x<-30||b.x>W+30){pBullets.splice(i,1);continue;}let removed=false;
      for(let j=enemies.length-1;j>=0;j--){const en=enemies[j];if(dist(b.x,b.y,en.x,en.y)<en.r+b.r){if(b.hit[en.id])continue;b.hit[en.id]=1;en.hp-=b.dmg;addPart(b.x,b.y,'#fff',3,120);sfx('ehit');if(en.hp<=0)killEnemy(en,j);if(!b.pierce){removed=true;break;}}}
      if(removed){pBullets.splice(i,1);continue;}
      if(boss&&state==='boss'){const br=(boss.isOni?120:boss.isTrue?58:44)*boss.scale;if(dist(b.x,b.y,boss.x,boss.y-6*boss.scale)<br&&!b.hit[-1]){b.hit[-1]=1;boss.hp-=b.dmg;addPart(b.x,b.y,'#fff',2,100);special=clamp(special+0.002,0,1);if(!b.pierce)pBullets.splice(i,1);if(boss.hp<=0){boss.hp=0;bossDead();}continue;}}}
    for(let i=enemies.length-1;i>=0;i--){const en=enemies[i];en.t+=dt;
      if(en.horiz){en.x-=en.speed*dt;if(en.amp)en.y=en.base+Math.sin(en.t*1.6)*en.amp;}else{en.y+=en.speed*dt;if(en.amp)en.x=en.base+Math.sin(en.t*1.6)*en.amp;}
      if(en.shoots){en.shootAcc-=dt;const onscr=en.horiz?en.x<W*0.96:en.y<H*0.7;if(en.shootAcc<=0&&onscr){en.shootAcc=rand(1.0,1.8);const a=aimAng(en.x,en.y);if(en.burst)emitFan(en.x,en.y,a,3,0.5,170,7,accent,'rgba(255,150,190,.45)');else eb(en.x,en.y,a,180,7,accent,'rgba(255,150,190,.45)');sfx('eshot');}}
      if(dist(en.x,en.y,player.x,player.y)<en.r+player.r+4)playerHit();
      if(en.horiz?en.x<-34:en.y>H+34)enemies.splice(i,1);}
    for(let i=eBullets.length-1;i>=0;i--){const b=eBullets[i];if(!b)continue;b.x+=b.vx*dt;b.y+=b.vy*dt;b.spin+=dt*4;if(b.x<-40||b.x>W+40||b.y>H+40||b.y<-60){eBullets.splice(i,1);continue;}if(dist(b.x,b.y,player.x,player.y)<b.r*0.6+player.r){eBullets.splice(i,1);playerHit();if(state==='gameover')return;break;}}
    if(state==='wave'){waveTime+=dt;spawnAcc-=dt;const s=STAGES[stageIdx];if(spawnAcc<=0&&waveTime<s.waveDur){spawnAcc=s.spawnGap*DIFFS[curDiff].spawnMul;spawnFormation();}if(waveTime>=s.waveDur&&enemies.length===0)spawnBoss();}
    if(state==='bossintro'&&boss){boss.x+=((boss.tx||W/2)-boss.x)*Math.min(1,dt*4);boss.y+=(boss.ty-boss.y)*Math.min(1,dt*4);if(stateTimer>1.5){state='boss';boss.aiT=0;boss.subAcc=0;}}
    if(state==='boss'&&boss){boss.t+=dt;if(boss.horiz){boss.x=boss.tx+Math.sin(boss.t*0.9)*(W*0.04);boss.y=H/2+Math.sin(boss.t*1.0)*(H*0.26);}else{boss.x=W/2+Math.sin(boss.t*0.9)*(W*(boss.isTrue?0.22:0.3));boss.y=boss.ty+Math.sin(boss.t*1.4)*12;}boss.phase=boss.hp/boss.maxHp<0.5?1:0;if(boss.phase===1&&!boss.enraged){boss.enraged=true;flash=0.6;flashCol='#fff';screenShake=20;hitStop(0.08);punchZoom(0.06,0.32);boss.gap=Math.max(boss.gap,0.4);const o=boss.isOni?'かくせい！':boss.boss==='cat'?'ブチギレ！':boss.boss==='robot'?'オーバーヒート！':boss.boss==='cloud'?'カミナリ全開！':'ほんき！';emitBigOno(boss.x,boss.y-30,o,'#ff3b5c');addFloat(boss.x,boss.y-64,'おこった！','#ff5a5a',24);sfx('boom');}const A=boss.attacks[boss.ai];if(boss.gap>0){boss.gap-=dt;boss.charge=0;}else{boss.aiT+=dt;A.fire(boss,boss.aiT,dt);if(boss.aiT>=A.dur){boss.ai=(boss.ai+1)%boss.attacks.length;boss.aiT=0;boss.subAcc=0;boss.shoutDone=false;boss.gap=0.45;}}}
    if(bombTimer>0&&boss&&state==='boss'){boss.hp-=boss.maxHp*0.10*dt;if(boss.hp<=0){boss.hp=0;bossDead();}}
  }
  if(state==='victory'&&Math.random()<0.7)parts.push({x:rand(0,W),y:-8,vx:rand(-40,40),vy:rand(60,140),life:2.2,max:2.2,size:rand(4,8),color:`hsl(${rand(0,360)},90%,65%)`,confetti:true});
}

/* ===== drawing helpers ===== */
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function softShadow(x,y,rx,ry,a){ctx.save();const g=ctx.createRadialGradient(x,y,0,x,y,rx);g.addColorStop(0,'rgba(0,0,0,'+a+')');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,TAU);ctx.fill();ctx.restore();}
function heartPath(x,y,s){ctx.beginPath();ctx.moveTo(x,y+s*0.35);ctx.bezierCurveTo(x+s*0.6,y-s*0.25,x+s*0.5,y-s*0.75,x,y-s*0.25);ctx.bezierCurveTo(x-s*0.5,y-s*0.75,x-s*0.6,y-s*0.25,x,y+s*0.35);ctx.closePath();}
function glowEye(x,y,r,col,wsx){ctx.save();ctx.globalCompositeOperation='lighter';const g=ctx.createRadialGradient(x,y,1,x,y,r*2.2);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*2.2,0,TAU);ctx.fill();ctx.restore();ctx.fillStyle='#1a1410';ctx.beginPath();ctx.ellipse(x,y,r*1.15,r*1.4,0,0,TAU);ctx.fill();ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y,r*0.7,r*1.15,0,0,TAU);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-r*0.3*(wsx||1),y-r*0.4,r*0.3,0,TAU);ctx.fill();}

/* ===== ZAKO draw（個性つき） ===== */
function drawEnemy(en){const t=now();softShadow(en.x,en.y+en.r*0.9,en.r*1.1,en.r*0.4,0.2);ctx.save();ctx.translate(en.x,en.y);const R=en.r;

}
function drawRobotBoss(fierce,t){

  const bg=ctx.createLinearGradient(0,-62,0,58);bg.addColorStop(0,'#e2e8f0');bg.addColorStop(0.5,'#aab6c6');bg.addColorStop(1,'#7c889a');ctx.fillStyle=bg;rr(-60,-58,120,116,30);ctx.fill();ctx.strokeStyle='#5b6675';ctx.lineWidth=4;rr(-60,-58,120,116,30);ctx.stroke();

function drawFusedBoss(b,opt){opt=opt||{};const sc=b.scale,t=b.t,cx=b.x+(opt.dx||0),cy=b.y;
  softShadow(cx,cy+86*sc,80*sc,16*sc,0.34);
  ctx.save();ctx.globalCompositeOperation='lighter';const cols=opt.alt?['rgba(90,240,255,.4)','rgba(120,160,255,.4)','rgba(180,90,255,.4)']:['rgba(255,210,80,.45)','rgba(255,120,60,.4)','rgba(255,90,160,.4)'];for(let i=0;i<3;i++){const a=t*0.6+i*TAU/3,ox=Math.cos(a)*28*sc,oy=Math.sin(a)*28*sc;const rg=ctx.createRadialGradient(cx+ox,cy+oy,5,cx+ox,cy+oy,108*sc);rg.addColorStop(0,cols[i]);rg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(cx+ox,cy+oy,108*sc,0,TAU);ctx.fill();}ctx.restore();
  if(b.charge>0){ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle=opt.alt?'#5af0ff':'#ffd24a';ctx.lineWidth=4;const r0=(Math.sin(now()*16)*0.5+0.5)*60+40;ctx.beginPath();ctx.arc(cx,cy,r0*sc,0,TAU);ctx.stroke();ctx.restore();}

  // crow wings behind (4th element)
  const flap=Math.sin(t*4)*0.16;for(const s of[-1,1]){ctx.save();ctx.translate(s*40,-18);ctx.rotate(s*(-0.3+flap));for(let k=0;k<5;k++){ctx.save();ctx.rotate(s*(-0.05+k*0.2));const len=92-k*6;const g=ctx.createLinearGradient(0,0,s*len,0);g.addColorStop(0,opt.alt?'#3a4a6e':'#33384e');g.addColorStop(1,'#0d0e18');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(s*len*0.5,2,len*0.5,9,0,0,TAU);ctx.fill();ctx.restore();}ctx.restore();}
  // storm mane behind

  const hg=ctx.createRadialGradient(-14,-30,8,0,-10,60);hg.addColorStop(0,opt.alt?'#9aa6d0':'#c2c6cf');hg.addColorStop(1,opt.alt?'#5a6088':'#7c828c');ctx.fillStyle=hg;fluffy(ctx,0,-14,54,12,0.07);ctx.fill();
  ctx.strokeStyle='#2a2a3a';ctx.lineWidth=7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-40,-34);ctx.lineTo(-10,-20);ctx.moveTo(40,-34);ctx.lineTo(10,-20);ctx.stroke();
  glowEye(-22,-6,9,opt.alt?'#5af0ff':'#ff5a5a',1);glowEye(22,-6,9,opt.alt?'#5af0ff':'#ff5a5a',1);
  // third eye
  glowEye(0,-40,7,opt.alt?'#b388ff':'#ffd24a',1);
  // crow beak (under the cat nose)
  ctx.fillStyle='#ffae3a';ctx.beginPath();ctx.moveTo(-12,14);ctx.lineTo(0,40);ctx.lineTo(12,14);ctx.closePath();ctx.fill();
  // fangs/mouth
  ctx.fillStyle='#5a1620';ctx.beginPath();ctx.ellipse(0,18,16,12,0,0,TAU);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(-10,12);ctx.lineTo(-6,26);ctx.lineTo(-2,12);ctx.closePath();ctx.moveTo(10,12);ctx.lineTo(6,26);ctx.lineTo(2,12);ctx.closePath();ctx.fill();
  // lightning crown
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=opt.alt?'rgba(120,220,255,.9)':'rgba(255,220,120,.9)';for(let i=-2;i<=2;i++){const hxx=i*16,hh=22+Math.abs(2-Math.abs(i))*6+Math.sin(now()*6+i)*4;ctx.beginPath();ctx.moveTo(hxx-5,-64);ctx.lineTo(hxx,-64-hh);ctx.lineTo(hxx+5,-64);ctx.closePath();ctx.fill();}ctx.restore();

function comicBurst(rO,pts,jag){ctx.beginPath();for(let i=0;i<pts*2;i++){const a=i/(pts*2)*TAU;const r=i%2?rO*(1-jag):rO;i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();}
function sfxStyle(text){
  if(/[ピパドバズギャ]/.test(text)||/ッ$/.test(text))return{skew:-0.2,jit:0.18,sy:1.06,spike:true};   // 鋭い/破裂
  if(/[ゴロウンドグブ]/.test(text))return{skew:-0.05,jit:0.07,sy:1.12,spike:false};                    // 重い/とどろき
  if(/シャ|ー/.test(text))return{skew:-0.26,jit:0.1,sy:0.95,spike:true};                                  // 鋭い擦過
  if(/カァ|カー|バサ/.test(text))return{skew:-0.16,jit:0.14,sy:1.0,spike:true};                           // 風切り
  return{skew:-0.13,jit:0.12,sy:1.0,spike:true};
}
function drawSfx(text,size,col,st){
  st=st||sfxStyle(text);const chars=[...text];ctx.font=`900 ${size}px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';
  let adv=[],tot=0;chars.forEach(c=>{const w=ctx.measureText(c).width*0.92;adv.push(w);tot+=w;});
  if(st.spike){ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=col;ctx.globalAlpha=0.22;comicBurst(Math.max(tot*0.62,size),11,0.5);ctx.fill();ctx.restore();}
  let x=-tot/2;for(let i=0;i<chars.length;i++){const w=adv[i],cx=x+w/2,rot=Math.sin(i*1.7)*st.jit,dy=Math.sin(i*2.1)*size*0.07;
    ctx.save();ctx.translate(cx,dy);ctx.transform(1,0,st.skew,1,0,0);ctx.rotate(rot);ctx.scale(1,st.sy);ctx.lineJoin='round';ctx.miterLimit=2;
    ctx.lineWidth=size*0.36;ctx.strokeStyle='#1c1018';ctx.strokeText(chars[i],0,0);
    ctx.lineWidth=size*0.2;ctx.strokeStyle='#fff';ctx.strokeText(chars[i],0,0);
    const g=ctx.createLinearGradient(0,-size*0.55,0,size*0.55);g.addColorStop(0,'#fff');g.addColorStop(0.45,col);g.addColorStop(1,shade(col,0.62));ctx.fillStyle=g;ctx.fillText(chars[i],0,0);
    ctx.restore();x+=w;}
}

  const b=bombBtn(),ready=special>=1;ctx.save();if(ready){const p=0.5+0.5*Math.sin(now()*9);ctx.globalCompositeOperation='lighter';ctx.fillStyle='rgba(255,160,200,'+(0.5*p)+')';ctx.beginPath();ctx.arc(b.x,b.y,b.r+10,0,TAU);ctx.fill();ctx.globalCompositeOperation='source-over';}const bg2=ctx.createLinearGradient(0,b.y-b.r,0,b.y+b.r);if(ready){bg2.addColorStop(0,'#ffd0e2');bg2.addColorStop(1,'#ff7aa6');}else{bg2.addColorStop(0,'#4a5570');bg2.addColorStop(1,'#222b3d');}ctx.fillStyle=bg2;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.fill();ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(b.x,b.y-b.r*0.4,b.r*0.7,b.r*0.35,0,0,TAU);ctx.fill();ctx.fillStyle=ready?'#7a1c40':'#8b97ad';ctx.font=`bold 14px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐾',b.x,b.y-5);ctx.font=`bold 9px ${FONT}`;ctx.fillText(ready?'TAP!':'ためる',b.x,b.y+11);ctx.restore();
  const pb=pauseBtn();ctx.save();ctx.fillStyle='rgba(0,0,0,.32)';rr(pb.x-pb.w/2,pb.y-pb.h/2,pb.w,pb.h,15);ctx.fill();ctx.fillStyle='#fff';ctx.font=`bold 12px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⏸ メニュー',pb.x,pb.y+1);ctx.restore();
}
function gradTitle(t,y,size){ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`bold ${size}px ${FONT}`;const g=ctx.createLinearGradient(0,y-size/2,0,y+size/2);g.addColorStop(0,'#fff');g.addColorStop(1,'#ffd0e2');ctx.lineWidth=6;ctx.strokeStyle='rgba(120,80,110,.5)';ctx.strokeText(t,W/2,y);ctx.fillStyle=g;ctx.fillText(t,W/2,y);}
function ctext(t,y,size,col,b,st){ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`${b?'bold ':''}${size}px ${FONT}`;if(st){ctx.lineWidth=st;ctx.strokeStyle='rgba(0,0,0,.45)';ctx.strokeText(t,W/2,y);}ctx.fillStyle=col;ctx.fillText(t,W/2,y);}
function ctextX(t,x,y,size,col,b,st){ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`${b?'bold ':''}${size}px ${FONT}`;if(st){ctx.lineWidth=st;ctx.strokeStyle='rgba(0,0,0,.45)';ctx.strokeText(t,x,y);}ctx.fillStyle=col;ctx.fillText(t,x,y);}
function tapHint(y){const a=0.55+0.45*Math.sin(now()*4);ctx.globalAlpha=a;ctext('▶ タップ',y,17,'#fff',true);ctx.globalAlpha=1;}
function drawShareBtn(){const b=shareBtn();ctx.save();const g=ctx.createLinearGradient(0,b.y-b.h/2,0,b.y+b.h/2);g.addColorStop(0,'#ff9fc0');g.addColorStop(1,'#ff6f9e');ctx.fillStyle=g;rr(b.x-b.w/2,b.y-b.h/2,b.w,b.h,23);ctx.fill();ctx.fillStyle='rgba(255,255,255,.25)';rr(b.x-b.w/2+4,b.y-b.h/2+3,b.w-8,b.h*0.4,18);ctx.fill();ctx.fillStyle='#fff';ctx.font=`bold 17px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('スコアをシェア ↗',b.x,b.y);ctx.restore();}
function drawFuse(){
  const p=clamp(stateTimer/2.4,0,1);
  const KS=['cat','robot','cloud','crow'];for(let i=0;i<4;i++){const a=-Math.PI/2+i*TAU/4+stateTimer*2.4;const Rr=(1-p)*W*0.32+8;const x=W/2+Math.cos(a)*Rr,y=H*0.42+Math.sin(a)*Rr*0.7;if(stateTimer<2.4){const sc=Math.max(0.05,0.5-0.4*p);ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);if(KS[i]==='cat')drawCatBoss(true,now());else if(KS[i]==='robot')drawRobotBoss(true,now());else if(KS[i]==='cloud')drawCloudBoss(true,now());else drawCrowBoss(true,now());ctx.restore();}}
  if(stateTimer<2.4){ctx.save();ctx.globalCompositeOperation='lighter';const gl=ctx.createRadialGradient(W/2,H*0.42,4,W/2,H*0.42,(50+p*120));gl.addColorStop(0,'rgba(255,230,140,'+(0.4+0.5*p)+')');gl.addColorStop(1,'rgba(255,200,60,0)');ctx.fillStyle=gl;ctx.beginPath();ctx.arc(W/2,H*0.42,50+p*120,0,TAU);ctx.fill();ctx.restore();}
}

function draw(dt){
  ctx.save();
  if(screenShake>0)ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
  if(zoomT>0){const z=1+zoomAmt*(zoomT/zoomDur);ctx.translate(W/2,H/2);ctx.scale(z,z);ctx.translate(-W/2,-H/2);}
  drawScene(dt);

  if(state==='title'){
    // twinkle sparkles
    (function(){const tt=now();ctx.save();ctx.globalCompositeOperation='lighter';for(let i=0;i<10;i++){const px=(Math.sin(i*12.9)*0.5+0.5)*W,py=((Math.cos(i*7.7)*0.5+0.5)*0.5+0.05)*H,tw=0.5+0.5*Math.sin(tt*2.4+i);ctx.globalAlpha=tw*0.55;ctx.fillStyle=i%3===0?'#ffd24a':'#fff';pStar(ctx,px,py,(2+tw*3));}ctx.restore();ctx.globalAlpha=1;})();
    // colored name line: うに & ゆきち & むぎ
    (function(){const parts=[['うに','#ff6f9e'],['&','#7a6a60'],['ゆきち','#a06a3c'],['&','#7a6a60'],['むぎ','#46b0c0']];const fs=Math.min(30,W*0.078);ctx.font=`bold ${fs}px ${FONT}`;ctx.textBaseline='middle';let tot=0;parts.forEach(p=>tot+=ctx.measureText(p[0]).width);let x=W/2-tot/2;const y=H*0.12+Math.sin(now()*2)*3;ctx.textAlign='left';ctx.lineWidth=5;ctx.strokeStyle='rgba(120,80,110,.45)';parts.forEach(p=>{const w=ctx.measureText(p[0]).width;ctx.strokeText(p[0],x,y);ctx.fillStyle=p[1];ctx.fillText(p[0],x,y);x+=w;});ctx.textAlign='center';})();
    gradTitle('ぷーどるシューティング',H*0.185,Math.min(30,W*0.076));
    ctext('― おさんぽ縦＆横 シューティング ULTRA ―',H*0.225,11,'#fff5fa',true);
    const gap=Math.min(70,W*0.22),R=Math.min(27,W*0.078);
    drawFlyer(ctx,W/2-gap,H*0.4,R,'uni','happy',now(),0,false);
    drawFlyer(ctx,W/2,H*0.385,R*1.12,'yuki','excited',now(),2,false);
    drawFlyer(ctx,W/2+gap,H*0.4,R,'mugi','happy',now(),4,false);
    ctextX('うに',W/2-gap,H*0.4+R*2.0,12,'#fff',true,3);ctextX('ゆきち',W/2,H*0.385+R*2.2,12,'#fff',true,3);ctextX('むぎ',W/2+gap,H*0.4+R*2.0,12,'#fff',true,3);
    const rk=rankFor(totalScore),nx=nextRank(totalScore);
    ctext('称号 '+rk.ico+' '+rk.name,H*0.55,16,'#ffe27a',true,3);
    if(nx)ctext('つぎの称号「'+nx.name+'」まで あと '+(nx.t-totalScore).toLocaleString()+' てん',H*0.59,11,'#fff5fa',true);
    else ctext('★ 全称号 制覇！おさんぽの伝説 ★',H*0.59,12,'#ffd24a',true);
    ctext('ごうけい '+totalScore.toLocaleString()+' てん'+(hiScore>0?'  ／  ハイスコア '+hiScore.toLocaleString():''),H*0.63,12,'#fff',true);
    if(saveData){const cb=contBtn();ctx.save();const g=ctx.createLinearGradient(0,cb.y-cb.h/2,0,cb.y+cb.h/2);g.addColorStop(0,'#7be08a');g.addColorStop(1,'#2f9e54');ctx.fillStyle=g;rr(cb.x-cb.w/2,cb.y-cb.h/2,cb.w,cb.h,24);ctx.fill();ctx.fillStyle='#fff';ctx.font=`bold 18px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';const lc=saveData.loopCount||0,ll=lc===0?'':lc===1?'裏':(lc+1)+'周 ';const lab=ll+'STAGE '+((saveData.stageIdx||0)+1)+(saveData.finalMode?'(決戦)':'');ctx.fillText('つづきから  '+lab,cb.x,cb.y);ctx.restore();ctext('▶ 画面下半分タップで さいしょから',H*0.92,12,'#fff5fa',true);}
    else tapHint(H*0.86);
    (function(){const pb=pwBtn();ctx.save();ctx.fillStyle='rgba(255,255,255,.14)';rr(pb.x-pb.w/2,pb.y-pb.h/2,pb.w,pb.h,19);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;rr(pb.x-pb.w/2,pb.y-pb.h/2,pb.w,pb.h,19);ctx.stroke();ctx.fillStyle='#fff';ctx.font=`bold 14px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔑 ひきつぎ／パスワード',pb.x,pb.y+1);ctx.restore();})();
    drawVignette();ctx.restore();return;
  }
  if(state==='charselect'){
    gradTitle('だれで あそぶ？',H*0.18,Math.min(32,W*0.08));
    ctext('せいかくで うごきが かわるよ',H*0.255,13,'#fff',true);
    const bs=charBtns();
    bs.forEach(b=>{ctx.save();ctx.fillStyle='rgba(255,255,255,.94)';rr(b.x-b.w/2,b.y-b.h/2,b.w,b.h,20);ctx.fill();ctx.restore();
      drawPoodle(ctx,b.x,b.y-b.h*0.12,b.w*0.3,b.key,{expr:'happy',bob:Math.sin(now()*3+b.x)*2});
      const hh=HERO[b.key];ctextX(hh.name,b.x,b.y+b.h*0.24,16,'#5a4f44',true);ctextX(hh.role,b.x,b.y+b.h*0.36,12,hh.col,true);});
    // 選択中ヒーローの説明（カード下）
    ctext('うに=万能 ／ ゆきち=連射拡散 ／ むぎ=一撃貫通',H*0.8,11,'#fff5fa',true);
    drawVignette();ctx.restore();return;
  }
  if(state==='diffselect'){
    gradTitle('むずかしさ',H*0.2,Math.min(32,W*0.08));
    ctext(HERO[heroKey].name+' で あそぶ',H*0.27,13,'#fff',true);
    const bs=diffBtns();bs.forEach(b=>{const D=DIFFS[b.key];ctx.save();const g=ctx.createLinearGradient(0,b.y-b.h/2,0,b.y+b.h/2);g.addColorStop(0,D.col);g.addColorStop(1,shade(D.col,0.72));ctx.fillStyle=g;rr(b.x-b.w/2,b.y-b.h/2,b.w,b.h,b.h*0.5);ctx.fill();ctx.fillStyle='rgba(255,255,255,.22)';rr(b.x-b.w/2+4,b.y-b.h/2+3,b.w-8,b.h*0.42,b.h*0.4);ctx.fill();ctx.restore();ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle='#3a2a18';ctx.font=`bold 18px ${FONT}`;ctx.fillText(D.name,b.x-b.w/2+22,b.y-b.h*0.12);ctx.font=`bold 11px ${FONT}`;ctx.fillText(D.label,b.x-b.w/2+22,b.y+b.h*0.2);ctx.textAlign='right';ctx.font=`bold 12px ${FONT}`;ctx.fillText('🐾×'+D.lives,b.x+b.w/2-18,b.y);ctx.textAlign='center';});
    ctext('クリア後は エンドレス周回で どんどん強敵に！',H*0.86,11,'#fff5fa',true);
    drawVignette();ctx.restore();return;
  }
  if(state==='stageintro'){const s=STAGES[stageIdx];const sw=clamp(stateTimer/0.35,0,1);ctx.save();ctx.globalAlpha=0.92*sw;const by=H*0.34,bh=72,off=(1-sw)*W;ctx.fillStyle=s.accent;ctx.beginPath();ctx.moveTo(-off,by-bh/2-12);ctx.lineTo(W-off,by-bh/2+8);ctx.lineTo(W-off,by+bh/2-8);ctx.lineTo(-off,by+bh/2+12);ctx.closePath();ctx.fill();ctx.globalAlpha=0.5*sw;ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(-off,by-bh/2-12,W,3);ctx.restore();
    gradTitle((isAlt()?loopLabel()+' ':'')+'STAGE '+(stageIdx+1),H*0.34,Math.min(38,W*0.095));ctext(s.name+' が あらわれた！',H*0.48,17,'#fff',true);ctext('わざ「'+s.line+'」'+(s.scroll==='h'?'  ／ ヨコ移動ステージ →':''),H*0.54,14,'#fff5fa',true);if(isAlt()){ctx.fillStyle='rgba(120,20,80,.12)';ctx.fillRect(0,0,W,H);}drawVignette();if(stateTimer>0.4)tapHint(H*0.86);ctx.restore();return;}
  if(state==='finalintro'){gradTitle((isAlt()?loopLabel()+'・':'')+'さいしゅう けっせん',H*0.3,Math.min(32,W*0.08));ctext((isAlt()?loopLabel()+' ':'')+'いたずら者 4たい 連戦！',H*0.4,17,'#ff8a8a',true,4);ctext('ニャンコ → ロボ → かみなり雲 → ヌシガラス',H*0.47,12,'#fff',true);drawFlyer(ctx,W/2,H*0.66,34,heroKey,'determined',now(),0,isAlt());drawVignette();if(stateTimer>0.5)tapHint(H*0.86);ctx.restore();return;}

  drawParts();if(treats.length)drawTreats();if(items.length)drawItems();enemies.forEach(drawEnemy);
  ctx.save();ctx.globalCompositeOperation='lighter';pBullets.forEach(b=>{ctx.fillStyle='rgba(255,150,200,.5)';heartPath(b.x,b.y,b.r*2.0);ctx.fill();});ctx.restore();
  pBullets.forEach(b=>{const g=ctx.createLinearGradient(0,b.y-b.r,0,b.y+b.r);g.addColorStop(0,'#fff');g.addColorStop(1,'#ff7aa6');ctx.fillStyle=g;heartPath(b.x,b.y,b.r);ctx.fill();ctx.strokeStyle='#ff6f9e';ctx.lineWidth=1;heartPath(b.x,b.y,b.r);ctx.stroke();});
  eBullets.forEach(drawEB);
  if(state==='fuseintro')drawFuse();
  if(boss&&(state==='bossintro'||state==='boss'))drawBoss();
  drawPlayer();drawBomb();drawFloats();drawOnoFx();if((state==='wave'||state==='boss')&&hearts<=1)dangerVignette();drawVignette();
  if(state==='wave'||state==='bossintro'||state==='boss')drawHUD();

  if(state==='bossintro'&&boss)drawCutin();
  if(state==='clear'){ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,0,W,H);gradTitle('STAGE '+(stageIdx+1)+' クリア！🎉',H*0.4,Math.min(28,W*0.07));ctext('SCORE '+score,H*0.5,24,'#fff',true,4);if(stateTimer>0.5)tapHint(H*0.66);}
  if(state==='rushnext'){ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,W,H);ctext('たいじ！',H*0.42,32,'#fff',true,5);ctext('つぎ ── '+(isAlt()?loopLabel()+' ':'')+STAGES[rushIndex].name+' 来る！',H*0.5,15,'#fff5fa',true);}
  if(state==='fakeclear'){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,W,H);ctext('…ぜんいん、たいじ完了！',H*0.4,26,'#fff',true,5);ctext('SCORE '+score,H*0.48,22,'#ffe27a',true);ctext(stateTimer<2.2?'やったね！':'…ん？ なにか 光って…！',H*0.56,14,stateTimer<2.2?'#fff5fa':'#ff8a8a',true);if(stateTimer>1.0)tapHint(H*0.7);}
  if(state==='fuseintro'){if(stateTimer<2.4){ctext(stateTimer<1.2?'4たいが あつまって…':'ひとつに なっていく…！',H*0.2,18,'#ff8a8a',true,4);}else{gradTitle((isAlt()?loopLabel()+' ':'')+'合 体 ！！',H*0.2,Math.min(42,W*0.1));ctext(FINAL.trueBoss.name,H*0.28,13,'#ffd24a',true);}}
  if(state==='victory'){drawParts();ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);gradTitle('鬼神 撃 破 ！！',H*0.2,Math.min(30,W*0.078));ctext('表裏一体の鬼神すら退けた、おさんぽ最強の英雄！',H*0.28,11,'#fff',true);ctext('SCORE '+score,H*0.37,28,'#ffe27a',true,5);ctext('さいだい コンボ '+bestCombo,H*0.43,14,'#fff5fa',true);ctext(score>=hiScore?'★ ハイスコア更新！':'ハイスコア '+hiScore.toLocaleString(),H*0.475,13,'#ffe27a',true);
    const rk=rankFor(totalScore+score);ctext('累計で 称号 '+rk.ico+' '+rk.name,H*0.52,13,'#ffd24a',true);
    ctext('▶ タップで エンドレス周回へ（さらに強敵！）',H*0.62,13,'#fff',true);
    const eb2=endBtn();ctx.save();ctx.fillStyle='rgba(255,255,255,.16)';rr(eb2.x-eb2.w/2,eb2.y-eb2.h/2,eb2.w,eb2.h,20);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;rr(eb2.x-eb2.w/2,eb2.y-eb2.h/2,eb2.w,eb2.h,20);ctx.stroke();ctx.fillStyle='#fff';ctx.font=`bold 14px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('おわってタイトルへ',eb2.x,eb2.y);ctx.restore();
    drawShareBtn();}
  if(state==='gameover'){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);ctext('おつかれさま…🐾',H*0.3,26,'#ff8aa0',true,5);ctext('SCORE '+score,H*0.39,26,'#ffe27a',true,5);ctext('さいだい コンボ '+bestCombo+(loopCount>=1?'  ／  '+loopLabel()+' とうたつ':''),H*0.45,13,'#fff5fa',true);ctext('ハイスコア '+hiScore.toLocaleString(),H*0.49,13,'#ffe27a',true);
    const rk=rankFor(totalScore+score);ctext('累計で 称号 '+rk.ico+' '+rk.name,H*0.535,13,'#ffd24a',true);
    if(canContinue&&stateTimer>0.6){const cb=goContBtn();ctx.save();const p=0.6+0.4*Math.sin(now()*6),g=ctx.createLinearGradient(0,cb.y-cb.h/2,0,cb.y+cb.h/2);g.addColorStop(0,'#ffd24a');g.addColorStop(1,'#ff9f3a');ctx.globalAlpha=p;ctx.fillStyle=g;rr(cb.x-cb.w/2,cb.y-cb.h/2,cb.w,cb.h,24);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle='#5a3a00';ctx.font=`bold 17px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('コンティニュー',cb.x,cb.y);ctx.restore();}
    drawShareBtn();if(stateTimer>0.6)ctext('画面下半分タップでタイトルへ',H*0.84,12,'#fff5fa',true);}

  if(flash>0){ctx.globalAlpha=flash;ctx.fillStyle=flashCol;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  ctx.restore();
}

/* ===== loop ===== */
function loop(){const t=now();let dt=t-lastT;lastT=t;if(dt>0.05)dt=0.05;const rdt=dt;if(slowmo>0)dt*=0.45;if(hitstop>0){hitstop-=rdt;dt*=0.04;}if(ovOpen)dt=0;
  try{if(Music.running&&!muted&&Music.on)Music.sched();update(dt);draw(rdt);}catch(e){if(window.__err)window.__err((e&&e.stack)?e.stack:String(e));}
  requestAnimationFrame(loop);}
try{loadAll();}catch(e){}
try{resize();}catch(e){}
try{buildScene('morning');}catch(e){}
window.addEventListener('orientationchange',()=>{setTimeout(()=>{try{resize();}catch(e){}},250);});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());
Music.play(SONGS.menu);
requestAnimationFrame(loop);
})();
</script>
